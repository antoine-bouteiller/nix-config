name: Update flake.lock and packages

on:
  schedule:
    - cron: "0 3 * * 0" # Every Sunday at 03:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            extra-experimental-features = nix-command flakes

      - name: Update flake.lock and packages
        env:
          NIX_PATH: nixpkgs=flake:nixpkgs
        run: nix run --impure .#update

      - name: Verify hosts build
        run: |
          set -e
          system=x86_64-linux
          hosts=$(nix eval --json --impure ".#checks.$system" --apply 'builtins.attrNames' | jq -r '.[]')
          for host in $hosts; do
            echo "::group::Verifying $host"
            nix build ".#checks.$system.$host" --dry-run --impure
            echo "::endgroup::"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(deps): auto-update flake.lock and packages"
            git push
          fi
